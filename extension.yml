schema_version: '1.0'

extension:
  id: memory-md
  name: 'Spec Kit Memory MD'
  version: '0.6.2'
  description: 'Workflow-integrated Markdown memory layer for Spec Kit projects.'
  author: DyanGalih
  repository: https://github.com/DyanGalih/spec-kit-memory-hub
  license: MIT

requires:
  speckit_version: '>=0.2.0'

provides:
  commands:
    - name: speckit.memory-md.bootstrap
      file: commands/speckit.memory-md.bootstrap.md
      description: 'Bootstrap layered memory, synthesis, and spec starter files in a target repo.'
    - name: speckit.memory-md.plan-with-memory
      file: commands/speckit.memory-md.plan-with-memory.md
      description: 'Read layered memory, synthesize constraints, and gate planning on conflicts.'
    - name: speckit.memory-md.capture
      file: commands/speckit.memory-md.capture.md
      description: 'Capture durable lessons from completed work using evidence and scope rules.'
    - name: speckit.memory-md.capture-from-diff
      file: commands/speckit.memory-md.capture-from-diff.md
      description: 'Review code diffs and persist only durable, evidenced lessons when needed.'
    - name: speckit.memory-md.audit
      file: commands/speckit.memory-md.audit.md
      description: 'Audit memory quality, scope, freshness, and synthesis hygiene.'

tags:
  - memory
  - markdown
  - ai-context
  - spec-kit
